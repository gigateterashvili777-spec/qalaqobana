<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ქალაქობანა - ონლაინ</title>
    <style>
        :root { --joker-green: #2d5a27; --dark-bg: #0b0d0f; --gold: #ffcc00; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* ჰედერი */
        #header { width: 100%; background: #1a1d21; padding: 15px; border-bottom: 2px solid var(--joker-green); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #game-title { font-size: 2rem; color: #4CAF50; font-weight: bold; text-shadow: 2px 2px #000; }
        .info-row { display: flex; justify-content: space-around; margin-top: 10px; font-size: 1.2rem; }

        /* რეკლამა */
        .ad-container { width: 100%; height: 60px; background: #151515; color: #444; display: flex; align-items: center; justify-content: center; border: 1px dashed #333; margin: 10px 0; font-size: 0.8rem; }

        /* პროფილის სექცია */
        #profile-area { cursor: pointer; transition: 0.3s; margin: 15px; position: relative; }
        #main-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; box-shadow: 0 0 15px var(--gold); }
        #main-avatar:hover { transform: scale(1.05); }

        /* თამაშის მაგიდა */
        .game-grid { width: 90%; max-width: 600px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #15181c; padding: 20px; border-radius: 20px; border: 2px solid var(--joker-green); }
        .field-box { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; padding-left: 5px; }
        input { padding: 12px; background: #1f2329; border: 1px solid #3a3f47; border-radius: 10px; color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--gold); }

        /* ღილაკი */
        #finish-btn { grid-column: span 2; padding: 18px; background: var(--joker-green); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 15px; text-transform: uppercase; }

        /* ჩატი */
        #chat-room { width: 90%; max-width: 600px; height: 150px; background: #000; margin-top: 15px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; }
        #chat-msgs { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; color: #ccc; }
        #chat-input { background: #222; border: none; padding: 12px; color: white; border-radius: 0 0 15px 15px; }

        /* 100 ავატარის მოდალი */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .avatar-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 600px; margin: auto; }
        .avatar-item { width: 100%; aspect-ratio: 1; border-radius: 15px; border: 2px solid #333; cursor: pointer; object-fit: cover; }
        .avatar-item:hover { border-color: var(--gold); }

        /* შედეგები */
        #score-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .score-card { background: #1a1d21; padding: 30px; border-radius: 20px; border: 2px solid var(--gold); width: 80%; text-align: center; }
    </style>
</head>
<body>

<div id="header">
    <div id="game-title">ქალაქობანა</div>
    <div class="info-row">
        <div>ასო: <span id="current-letter" style="color:var(--gold)">?</span></div>
        <div>დრო: <span id="timer" style="color:#ff4444">07:00</span></div>
    </div>
</div>

<div class="ad-container">ბანერული რეკლამა (ID: 123456)</div>

<div id="profile-area" onclick="showAvatars()">
    <img id="main-avatar" src="https://api.dicebear.com/8.x/avataaars/svg?seed=Luffy">
    <div style="text-align:center; color:var(--gold); font-size:0.8rem; margin-top:5px;">შეცვალე გმირი</div>
</div>

<div class="game-grid" id="main-table">
    <div class="field-box"><label>ქალაქი</label><input type="text" id="city"></div>
    <div class="field-box"><label>ქვეყანა</label><input type="text" id="country"></div>
    <div class="field-box"><label>ცხოველი</label><input type="text" id="animal"></div>
    <div class="field-box"><label>ფრინველი</label><input type="text" id="bird"></div>
    <div class="field-box"><label>სახელი</label><input type="text" id="name"></div>
    <div class="field-box"><label>გვარი</label><input type="text" id="lastname"></div>
    <div class="field-box"><label>მცენარე</label><input type="text" id="plant"></div>
    <div class="field-box"><label>კინო (ფილმი/ანიმე)</label><input type="text" id="movie"></div>
    <button id="finish-btn" onclick="triggerFinish()">მოვრჩი!</button>
</div>

<div id="chat-room">
    <div id="chat-msgs">სერვერი #1: მოგესალმებით! ონლაინშია 1,240 მოთამაშე.</div>
    <input type="text" id="chat-input" placeholder="დაწერე მესიჯი...">
</div>

<div id="modal">
    <h2 style="text-align:center; color:var(--gold);">აირჩიე შენი პერსონაჟი (100)</h2>
    <div class="avatar-list" id="list"></div>
    <button onclick="closeAvatars()" style="width:100%; padding:15px; margin-top:20px; background:#ff4444; color:white; border:none; border-radius:10px;">დახურვა</button>
</div>

<div id="score-overlay">
    <div class="score-card">
        <h2 style="color:var(--gold);">თამაში დასრულდა!</h2>
        <div id="score-details" style="text-align:left; margin:15px 0;"></div>
        <h1 id="total-sum">0</h1>
        <button onclick="location.reload()" style="background:var(--joker-green); color:white; padding:15px 30px; border:none; border-radius:10px;">შემდეგი რაუნდი</button>
    </div>
</div>

<script>
    // 1. შემთხვევითი ასო
    const geoLetters = "აბგდევზთიკლმნოპჟრსტუფქღყშჩცძწჭხჯჰ";
    const letter = geoLetters[Math.floor(Math.random() * geoLetters.length)];
    document.getElementById('current-letter').innerText = letter;

    // 2. ტაიმერის ლოგიკა
    let timeLeft = 420;
    let timerActive = true;
    const countdown = setInterval(() => {
        if(timeLeft <= 0) { triggerFinish(); clearInterval(countdown); }
        else {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);

    // 3. დასრულების ლოგიკა (10 წამის წესი)
    function triggerFinish() {
        if(timeLeft > 10) {
            timeLeft = 10;
            alert("ვიღაცამ დაამთავრა! დაგრჩა 10 წამი!");
        } else if(timeLeft <= 0) {
            calculatePoints();
        }
    }

    // 4. ქულების სისტემა
    function calculatePoints() {
        const fields = ['city', 'country', 'animal', 'bird', 'name', 'lastname', 'plant', 'movie'];
        let total = 0;
        let detailsHtml = "";

        fields.forEach(f => {
            let val = document.getElementById(f).value.trim();
            let pts = 0;
            if(val.length > 0 && val[0].toLowerCase() === letter.toLowerCase()) {
                pts = 20; // რადგან მარტო ხარ, 20 ქულა (შემდეგში სერვერი დააკლებს)
            }
            total += pts;
            detailsHtml += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #333;"><span>${f.toUpperCase()}:</span><span>${pts}</span></div>`;
        });

        document.getElementById('score-details').innerHTML = detailsHtml;
        document.getElementById('total-sum').innerText = "სულ: " + total + " ქულა";
        document.getElementById('score-overlay').style.display = 'flex';
    }

    // 5. 100 ავატარის გენერაცია (ნარუტო, ლუფი და სხვები)
    const list = document.getElementById('list');
    for(let i=1; i<=100; i++) {
        const img = document.createElement('img');
        img.className = 'avatar-item';
        // ვიყენებთ სხვადასხვა სტილებს (ანიმე, მულტფილმი)
        let set = (i <= 50) ? 'bottts' : 'pixel-art';
        img.src = `https://api.dicebear.com/8.x/${set}/svg?seed=${i + (i > 50 ? 'girl' : 'boy')}`;
        img.onclick = () => {
            document.getElementById('main-avatar').src = img.src;
            closeAvatars();
        };
        list.appendChild(img);
    }

    function showAvatars() { document.getElementById('modal').style.display = 'block'; }
    function closeAvatars() { document.getElementById('modal').style.display = 'none'; }

    // ჩეთის იმიტაცია
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && e.target.value) {
            document.getElementById('chat-msgs').innerHTML += `<div><b>შენ:</b> ${e.target.value}</div>`;
            e.target.value = "";
        }
    });
</script>

</body>
</html>
